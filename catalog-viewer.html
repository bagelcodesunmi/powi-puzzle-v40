<style>

  .bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:8px; }

  .card { background:#232329; border:1px solid #333339; border-radius:10px; padding:10px; cursor:pointer; }
  .card:hover { border-color:#6a6a75; }
  .card.sel { border-color:#e8b64c; }
  .card svg { display:block; margin:0 auto 8px; }
  .meta { display:flex; justify-content:space-between; align-items:center; font-size:12px; }
  .min { font-weight:700; font-size:14px; }
  .bot-hi { color:#5fd08a; font-weight:700; } .bot-mid { color:#e8b64c; font-weight:700; } .bot-lo { color:#e06060; font-weight:700; } .bot-na { color:#8a877e; }

  .flag2 { font-size:11px; color:#8a877e; }

  #detail.show { display:block; }
  #detail h2 { font-size:15px; margin-bottom:8px; }
  #detail .drow { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; }
  pre { background:#1b1b1f; border:1px solid #333339; border-radius:6px; padding:10px; font-size:12px; overflow-x:auto; flex:1; min-width:260px; }
  button { background:#2a2a30; color:#e8e4da; border:1px solid #55555e; border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; }

  .mirbar { display:flex; gap:8px; align-items:center; margin:8px 0; font-size:13px; }
  .err { background:#3a2626; border:1px solid #7a4040; border-radius:8px; padding:14px; font-size:13px; line-height:1.7; margin-bottom:16px; }

</div>

// ▲ SNAPSHOT-END
const CATS = {};        // board -> entries
let usedSnapshot = false;
let selKey = null, selEntry = null, fx = false, fy = false;

const $ = id => document.getElementById(id);

async function loadAll() {
  const boards = [3, 4, 5];
  for (const n of boards) {
    try {
      const res = await fetch('Level/catalog-b' + n + '.json');
      if (!res.ok) throw new Error(res.status);
      CATS[n] = (await res.json()).entries;
    } catch (e) {
      // file:// 등 fetch 불가 → 구워진 스냅샷으로 폴백 (게임·감정곡선과 같은 패턴)
      if (SNAPSHOT[n]) { CATS[n] = SNAPSHOT[n].entries; usedSnapshot = true; }
    }
  }
  if (Object.keys(CATS).length === 0) {
    $('err').style.display = 'block';
    $('err').innerHTML = 'catalog 데이터가 없습니다. <code>node catalog-walls.js --build 4</code> 등으로 생성한 뒤 ' +
      '<code>node catalog-walls.js --sync-viewer</code>를 실행하면 더블클릭(file://)으로도 열립니다.<br>' +
      '서버(localhost/미리보기)로 열면 <code>Level/catalog-b*.json</code>을 실시간으로 읽습니다.';
    return;
  }
  if (usedSnapshot) {
    $('err').style.display = 'block';
    $('err').style.background = '#2a2a30';
    $('err').style.borderColor = '#55555e';
    $('err').innerHTML = '📌 스냅샷 데이터로 표시 중 (마지막 <code>--sync-viewer</code> 시점: ' + (SNAPSHOT.builtAt || '?') + '). ' +
      '카탈로그를 다시 생성했다면 <code>node catalog-walls.js --sync-viewer</code>로 갱신하거나, 서버로 열면 항상 최신입니다.';
  }
  render();
}

function wallCells(w) {
  if (!w) return null;
  return w.type === 'r'
    ? { x1: w.x + 1, y1: w.y, x2: w.x + 1, y2: w.y + 1 }     // (x,y)|(x+1,y) 사이 세로선
    : { x1: w.x, y1: w.y + 1, x2: w.x + 1, y2: w.y + 1 };    // (x,y)|(x,y+1) 사이 가로선
}
function mir(e) {   // 현재 fx/fy 반전을 적용한 (enemy, wall)
  const N = e.board;
  let [ex, ey] = e.enemy;
  if (fx) ex = N - 1 - ex;
  if (fy) ey = N - 1 - ey;
  let w = e.wall ? { ...e.wall } : null;
  if (w) {
    if (fx) w.x = w.type === 'r' ? N - 2 - w.x : N - 1 - w.x;
    if (fy) w.y = w.type === 'd' ? N - 2 - w.y : N - 1 - w.y;
  }
  return { ex, ey, w };
}
function boardSvg(e, size, useMirror) {
  const N = e.board, cell = size / N;
  const m = useMirror ? mir(e) : { ex: e.enemy[0], ey: e.enemy[1], w: e.wall };
  let s = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">';
  s += '<rect x="0" y="0" width="' + size + '" height="' + size + '" rx="6" fill="#c9a04e"/>';
  for (let i = 1; i < N; i++) {
    s += '<line x1="' + i * cell + '" y1="0" x2="' + i * cell + '" y2="' + size + '" stroke="#a5813a" stroke-width="1"/>';
    s += '<line y1="' + i * cell + '" x1="0" y2="' + i * cell + '" x2="' + size + '" stroke="#a5813a" stroke-width="1"/>';
  }
  const pad = cell * 0.14;
  s += '<rect x="' + (m.ex * cell + pad) + '" y="' + (m.ey * cell + pad) + '" width="' + (cell - 2 * pad) + '" height="' + (cell - 2 * pad) + '" rx="4" fill="#d84a3a"/>';
  if (m.w) {
    const wc = wallCells(m.w);
    s += '<line x1="' + wc.x1 * cell + '" y1="' + wc.y1 * cell + '" x2="' + wc.x2 * cell + '" y2="' + wc.y2 * cell + '" stroke="#f2ead6" stroke-width="5" stroke-linecap="round"/>';
  }
  s += '</svg>';
  return s;
}
function botClass(b) { return b === undefined ? 'bot-na' : b >= 90 ? 'bot-hi' : b >= 40 ? 'bot-mid' : 'bot-lo'; }
function keyOf(e) { return e.board + '|' + e.combat + '|' + e.enemy + '|' + (e.wall ? e.wall.type + e.wall.x + ',' + e.wall.y : '-'); }

function render() {
  const bd = +$('fBoard').value;
  const list0 = CATS[bd] || [];
  const fc = $('fCombat').value, fm = $('fMin').value, fb = $('fBot').value;
  // min 필터 옵션 갱신 (보드 바뀔 때)
  const mins = [...new Set(list0.map(e => e.min === null ? '9+' : e.min))].sort((a, z) => (a === '9+' ? 99 : a) - (z === '9+' ? 99 : z));
  const fMinEl = $('fMin');
  const cur = fMinEl.value;
  fMinEl.innerHTML = '<option value="all">전체</option>' + mins.map(m => '<option' + (String(m) === cur ? ' selected' : '') + '>' + m + '</option>').join('');

  let list = list0.slice();
  if (fc !== 'all') list = list.filter(e => String(e.combat) === fc);
  if (fMinEl.value !== 'all') list = list.filter(e => (e.min === null ? '9+' : String(e.min)) === fMinEl.value);
  if (fb === 'hi') list = list.filter(e => e.bot >= 90);
  if (fb === 'mid') list = list.filter(e => e.bot >= 40 && e.bot <= 80);
  if (fb === 'lo') list = list.filter(e => e.bot !== undefined && e.bot < 40);
  if (!$('fShield').checked) list = list.filter(e => !e.shieldedCorner);
  const sortV = $('fSort').value;
  list.sort((a, z) => {
    const am = a.min === null ? 99 : a.min, zm = z.min === null ? 99 : z.min;
    if (sortV === 'min') return am - zm || (z.bot ?? -1) - (a.bot ?? -1);
    if (sortV === 'botDesc') return (z.bot ?? -1) - (a.bot ?? -1) || am - zm;
    return (a.bot ?? 999) - (z.bot ?? 999) || am - zm;
  });
  $('cnt').textContent = list.length + '개 표시';

  if (!list.length) {
    $('grid').innerHTML = '<div style="grid-column:1/-1;color:#8a877e;font-size:13px;padding:24px;text-align:center">조건에 맞는 후보가 없습니다 — 예고봇 필터를 낮추거나 min을 바꿔보세요.<br>참고: 90%+ 튜토리얼급은 대부분 min 1~3 (밀착 벽 주머니)에만 존재합니다.</div>';
    renderDetail();
    return;
  }
  $('grid').innerHTML = list.map(e => {
    const k = keyOf(e);
    return '<div class="card' + (k === selKey ? ' sel' : '') + '" data-k="' + k + '">' +
      boardSvg(e, 120, false) +
      '<div class="meta"><span class="min">min ' + (e.min === null ? '9+' : e.min) + '</span>' +
      '<span class="' + botClass(e.bot) + '">' + (e.bot === undefined ? '—' : Math.round(e.bot) + '%') + '</span>' +
      '<span>' + (e.combat ? '⚔ 전투' : '평화') + '</span></div>' +
      '<div class="meta" style="margin-top:4px"><span class="flag2">median ' + (e.botMedian ?? '—') + '</span>' +
      (e.shieldedCorner ? '<span class="flag">차폐코너</span>' : (e.timedOut ? '<span class="flag2">타임아웃</span>' : '')) + '</div></div>';
  }).join('');
  for (const el of document.querySelectorAll('.card')) el.addEventListener('click', () => select(el.dataset.k, list));
  renderDetail();
}

function select(k, list) {
  selKey = k;
  selEntry = (list || Object.values(CATS).flat()).find(e => keyOf(e) === k) || null;
  fx = false; fy = false;
  render();
}
function levelJson(e) {
  const m = mir(e);
  const o = { board: e.board, combat: e.combat, enemies: [{ x: m.ex, y: m.ey }], walls: [], rightWalls: [], downWalls: [] };
  if (m.w) (m.w.type === 'r' ? o.rightWalls : o.downWalls).push({ x: m.w.x, y: m.w.y });
  return JSON.stringify(o, null, 2);
}
function renderDetail() {
  const d = $('detail');
  if (!selEntry) { d.className = ''; d.innerHTML = ''; return; }
  const e = selEntry;
  d.className = 'show';
  d.innerHTML = '<h2>선택한 후보 — ' + e.board + '×' + e.board + ' · ' + (e.combat ? '전투' : '비전투') +
    ' · min ' + (e.min === null ? '9+ (타임아웃)' : e.min) + ' · 예고봇 ' + (e.bot === undefined ? '—' : e.bot + '%') +
    (e.shieldedCorner ? ' · ⚠️ 차폐 코너 (초반 금지, §9-6)' : '') + '</h2>' +
    '<div class="mirbar">미러 변형: <button id="bfx">좌우 반전 ' + (fx ? 'ON' : 'off') + '</button>' +
    '<button id="bfy">상하 반전 ' + (fy ? 'ON' : 'off') + '</button>' +
    '<span style="color:#8a877e">— 게임 미러링이 보여줄 4가지 방향을 미리 확인</span></div>' +
    '<div class="drow"><div>' + boardSvg(e, 180, true) + '</div>' +
    '<pre id="json">' + levelJson(e) + '</pre>' +
    '<div style="display:flex;flex-direction:column;gap:8px"><button id="copy">JSON 복사</button>' +
    '<span style="font-size:12px;color:#8a877e;max-width:200px">level-lab에 붙여넣거나 levels.json 저장 포맷에 맞춰 schedule/min/seeds를 채워 쓰세요. 채택 전 2,000판 재측정 권장 (카탈로그는 800판).</span></div></div>';
  $('bfx').addEventListener('click', () => { fx = !fx; renderDetail(); });
  $('bfy').addEventListener('click', () => { fy = !fy; renderDetail(); });
  $('copy').addEventListener('click', () => { navigator.clipboard.writeText($('json').textContent); $('copy').textContent = '복사됨!'; setTimeout(() => $('copy').textContent = 'JSON 복사', 1200); });
}

for (const id of ['fBoard', 'fCombat', 'fMin', 'fBot', 'fSort', 'fShield']) $(id).addEventListener('change', render);
loadAll();
</script>
