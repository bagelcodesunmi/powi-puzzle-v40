<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포위 퍼즐</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#1b1b1f; touch-action:none; }
  body { display:flex; flex-direction:column; align-items:center; font-family:system-ui, sans-serif; }
  #hud {
    width:100%; max-width:520px; padding:10px 16px;
    display:flex; justify-content:space-between; color:#e8e4da; font-size:15px;
  }
  #hud b { font-size:18px; }
  #stage { position:relative; flex:1; width:100%; max-width:520px; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; border-radius:8px; }
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:16px;
    align-items:center; justify-content:center; background:rgba(20,20,24,.72); border-radius:8px;
  }
  #overlay.hidden { display:none; }
  #msg { color:#fff; font-size:26px; font-weight:700; }
  #restart {
    padding:12px 28px; font-size:16px; border:none; border-radius:24px;
    background:#e8e4da; color:#1b1b1f; font-weight:700;
  }
</style>
</head>
<body>
  <div id="hud">
    <span>레벨 <b id="uiLevel">1</b></span>
    <span>적 <b id="uiFoes">0</b></span>
    <span>내블록 <b id="uiStones">0</b></span>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="overlay" class="hidden">
      <div id="msg"></div>
      <button id="restart">처음부터</button>
    </div>
  </div>

<script>
// ═════ 포위 퍼즐 — 현재 게임 (edge wall 기반, 레벨 소스: Level/levels.json) ═════
// 배치: 빈칸 어디든 탭 1회 = 내블록 1개(HP 1). 1:1 고정 턴 (내 배치 1 ↔ 적 턴 1).
//       ※ 용어(glossary): 화살 쏘는 주체·플레이어가 놓는 것 = "내블록". "벽"은 경계벽(edge wall) 전용.
// 포획: 적 영역의 빈칸이 0(완전 밀폐)이 되면, 영역에 인접한 각 내블록이 화살 1발씩 발사.
//       내블록은 자기와 붙은 적을 최대 매칭으로 조준 — 내블록당 1킬.
//       안 맞은 적(비인접 심, 내블록 소진)은 생존. 죽은 칸은 빈칸으로 열림 → 재조임으로 겹 벗기기.
// 확산: 적 턴마다 프런티어 1칸(개방도 가중 랜덤). 자살 칸(영역의 마지막 빈칸)은 대안이 있으면 회피,
//       갈 곳이 그 칸뿐이면 강제 진입(자충 → 파동 발사). 예고 점선 = 실행과 동일 기준으로 매 프레임 검증.
// 적 턴 순서 [v35]: [확산] → (강제 자충 시 파동 종료까지 턴 유지) → 내 턴. 내블록 공격 단계 없음.
// 전투(combat 레벨) [v36]: 적의 공격은 포획 반격 하나뿐 — 밀폐된 영역의 적 전원이 동시 반격.
//       (매칭, 적당 1발, 내블록당 1타 1데미지, 면제 없음 — 마무리 내블록도 맞는다) 죽는 적도 쏘며 죽는다.
//       다른 영역의 적은 불참 (도발 없는 공격 금지 원칙). 비전투 레벨은 반격 없음. 적 턴 = 확산만.
//       적 HP2라 같은 적이 두 볼리에 걸쳐 내블록을 때리면 그만큼 내블록이 삭는다 (내블록 HP는 1 고정 — 반격 1타=파괴).
// 실패 [v37 유예]: 확산 레벨은 마지막 내블록 이후에도 적 턴(강제 자충 포함)을 끝까지 실행하고,
//       그래도 적이 남아 있으면 그때 내블록 소진 실패. 정지 레벨은 즉시 판정. 승리: 적 전멸.
// ─── 히스토리: v28 별점 제거 → v30 포획 화살 연출 → v32 겹 벗기기·밀폐 발동·자살 확산 금지·공격 선행 턴
//              → v33 전투 매칭·화살 대칭화 → v34 포획 총격전 → v35 매 턴 공격 폐지 → v36 내구도 2·좌상단 발사·반격 밀폐 한정·레벨 재편 → v37 유예 판정 → v39 손상 표현 제거 → v40 전면 내구도 1 (반격 1발 = 벽 파괴) + 14 단일 적 교체.
// ─── 삭제된 시스템: 머지, 영토(자동 벽·틴트·배치 금지), 열매·아이템, 별점.
const LEVELS = [
  // ▼ AUTO-GENERATED — Level/levels.json 에서 생성됨. 직접 편집 금지. 재생성: node sync-levels.js
  { board: 3, enemies: [[1,1]], rightWalls: [[0,1],[1,1]], downWalls: [[1,0]], mirror: false, schedule: [1], spread: true, combat: false, min: 1, exactBudget: true, seeds: [100001] }, // 1 edge wall 튜토리얼: 아래 1면만 열고 막기 — 방향 고정
  { board: 3, enemies: [[1,0]], rightWalls: [[1,0]], mirror: false, schedule: [1,1], spread: true, combat: false, min: 2, exactBudget: true, seeds: [200001] }, // 2 edge wall 반응 실험 — 방향 고정
  { board: 4, enemies: [[1,2]], rightWalls: [[0,2]], downWalls: [[1,1]], mirror: false, schedule: [1,1,1], spread: true, combat: false, min: 3, exactBudget: true, seeds: [300001,300002,300003] }, // 3 4x4 edge wall 힌트: 적 (1,2) 왼면+윗면 벽 주머니 — 방향 고정
  { board: 4, enemies: [[0,0],[2,0]], rightWalls: [[2,0]], downWalls: [[2,0]], mirror: false, schedule: [1,1,1,1], spread: true, combat: false, min: 4, exactBudget: true, seeds: [400001,400002,400003] }, // 4 첫 2기: 오른쪽 적 ㄱ자 밀폐 + 왼쪽 추격 — 솔버 min 3(심층 수순·예고봇 0%), 예산 4(슬랙+1)로 예고봇 100% · 시드는 예산 4 기준 검증
  { board: 5, enemies: [[4,2]], rightWalls: [[3,0],[3,2]], schedule: [1,1,1], spread: true, combat: false, min: 3, exactBudget: true, seeds: [500002,500003,500004] }, // 5 5×5 진입: 오른쪽 가장자리 세로 복도 밀폐 — 원거리 경계벽 첫 등장(위쪽 벽이 복도 옆면을 미리 닫아둠). 구 L3 이식판은 반복 경보(구조 이식)로 교체(2026-07-21). 카탈로그 b5w2 채택 — 솔버 min 3 확정 · 예산 2는 우호 확산 5000판 0승(정확히 3턴) · 예고봇 100%(2000판) · 시드 3개 PASS(미러 반전 포함)
  { board: 5, enemies: [[2,2]], rightWalls: [[1,2],[2,2]], downWalls: [[2,1]], mirror: false, schedule: [1], spread: true, combat: true, min: 1, exactBudget: true, seeds: [600001,600002] }, // 6 전투 첫 등장: 중앙 적 3면 벽 주머니(L1 구조를 5×5에 이식) — 1탭 포획하면서 내 돌도 같이 깨지는 걸 처음 본다. 솔버 min 1 · 예고봇 100% — 방향 고정(아래 열림)
  { board: 5, enemies: [[1,0]], rightWalls: [[1,0]], schedule: [1,1], spread: true, combat: true, min: 2, exactBudget: true, seeds: [700001,700002] }, // 7 반격 학습: L2의 추격 봉인을 좌상 코너에 이식(코너가 작은 보드 역할) — 마지막 포획에서 돌 2개가 반격으로 같이 깨진다. 솔버 min 2 확정 · 예산 1은 우호 확산 5000판 0승(정확히 2턴) · 예고봇 100%
  { board: 5, enemies: [[4,2]], rightWalls: [[3,0],[3,2]], schedule: [1,1,1], spread: true, combat: true, min: 3, exactBudget: true, seeds: [800002,800003,800004] }, // 8 복도 전투: L5와 완전히 같은 판 + 반격 — 같은 판인데 이번엔 적이 반격한다 (L5 교체에 맞춰 동기화, 2026-07-21). 솔버 min 3 확정 · 예산 2는 우호 확산 5000판 0승(정확히 3턴) · 예고봇 100%(2000판) · 시드 3개 PASS(미러 반전 포함)
  { board: 5, enemies: [[1,3]], downWalls: [[1,2]], schedule: [1,1,1,1], spread: true, combat: true, min: 4, exactBudget: true, seeds: [900001,900002,900003,900004] }, // 9 자립 전투: 구 주머니 판(2026-07-21 이전 L8, 적 (1,3)+윗면 벽)에서 왼쪽 경계벽이 사라진 판 — 현 L8과는 독립 · 솔버 min 4 확정 · 예고봇 52%(확산 분기 대응 요구, 분산형: 우호 확산 시 3턴 클리어 존재) · 중간 포획 가능 → §14-2 시드 한계, 실제 플레이 최종 확인 필요
  { board: 5, enemies: [[1,2]], downWalls: [[1,2]], schedule: [1,1,1,1,1], spread: true, combat: true, min: 5, exactBudget: true, seeds: [1000001,1000002,1000003,1000004] }, // 10 5×5 전투 피날레: L9와 같은 벽인데 적이 한 칸 위(아래 공간이 넓어짐) — 솔버 min 5 확정 · 예고봇 30%(스트레스 구간, median 4) · 중간 포획 가능 → §14-2 시드 한계, 실제 플레이 최종 확인 필요
];

// v43 edge wall scaffold fields: rightWalls, downWalls
let rightWallSet = new Set();
let downWallSet = new Set();
// [금 간 벽 2026-07-20] 적만 부술 수 있는 1히트 경계벽 — 부서지기 전엔 일반 경계벽과 동일 차단 (docs/checklist-cracked-walls.md)
let crackedRightSet = new Set();
let crackedDownSet = new Set();
const wallKey = (x, y) => `${x},${y}`;
function hasRightWall(x, y) { return rightWallSet.has(wallKey(x, y)) || crackedRightSet.has(wallKey(x, y)); }
function hasDownWall(x, y) { return downWallSet.has(wallKey(x, y)) || crackedDownSet.has(wallKey(x, y)); }
function blockedBetween(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  if (Math.abs(dx) + Math.abs(dy) !== 1) return false;
  if (dx === 1) return hasRightWall(x1, y1);
  if (dx === -1) return hasRightWall(x2, y2);
  if (dy === 1) return hasDownWall(x1, y1);
  if (dy === -1) return hasDownWall(x2, y2);
  return false;
}

// grid 값: 0=빈칸, -1=적, 양수=벽 내구도
// [v40] 기본 내구도 1 — 반격 1발 = 벽 즉시 파괴 (승리 경로 축소로 난도 확보).
//       확산형 2기는 내구도 1에서 구조적 발산(검증) → 2기 레벨(15)만 hp:2 플래그로 내구도 2.
// ===== mulberry32 시드 PRNG =====
// [분리 원칙] 로직(미러링·확산)만 시드 PRNG(prng)를 쓴다. 연출(파티클·흔들림)은 fxRng(비시드)로 분리.
//   → 파티클이 시드 PRNG를 소비하지 않으므로, 중간 포획(연출 발생)이 있어도 확산 경로가
//     검증 도구(verify-level·레벨랩 워커)와 항상 일치한다. 시드 고정 시 확산·미러링 재현성 유지.
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let z = Math.imul(seed ^ seed >>> 15, 1 | seed);
    z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z;
    return ((z ^ z >>> 14) >>> 0) / 4294967296;
  };
}
let prng = Math.random;   // 로직 전용(미러링·확산). 레벨 로드 시 시드 PRNG로 교체됨
let fxRng = Math.random;  // 연출 전용(파티클·흔들림). 시드에 묶이지 않음 — 확산 재현성에 영향 없음
let currentSeed = 0;      // 현재 레벨에서 사용 중인 시드

const EMPTY = 0, ENEMY = -1;
// [적 개체화 2026-07-19] 적 음수 코드 비트: bit0=전투, bit1=hp2, bit2=잠금 (docs/checklist-enemy-traits.md)
// -1 일반 · -2 전투 · -3 hp2 · -4 hp2+전투 · -5~-8 잠금 변형 (밀폐 순간 볼리를 이미 받고 생존 — 재발사 없음)
const foeCombat = v => ((-v - 1) & 1) === 1;
const foeTough = v => ((-v - 1) & 2) === 2;
const foeLocked = v => ((-v - 1) & 4) === 4;
const foeNorm = v => foeLocked(v) ? v + 4 : v;
const foeValue = (hp2, combat) => -(1 + (combat ? 1 : 0) + (hp2 ? 2 : 0));

// ===== 상태 =====
let N = 2;
let levelIdx = 0, level = null;
let grid, gameOver;
let stonesLeft = 0, turnLeft = 0, turnIdx = 0;
let nextSpread = null;
let nextBreak = null;                          // [금 간 벽] 다음 적 턴에 부술 벽 {t:'r'|'d', x, y} — 확산보다 우선
let flashes = [], particles = [];
let dying = [];                                // 폭발 큐 (화살 명중 시각에 터뜨림)
let bolts = [];                                // [v30] 포획 화살 + [v33] 전투 화살(combat:true) 공용
let pendingHits = [];                          // [v34] 반격 명중 큐 {c, at}: 화살 명중 순간 벽 내구도 감소 (loop에서 처리)
let pendingFlashes = [];                       // [적 개체화] 지연 플래시 큐 {c, at, col}: hp2 피격 강등 표시
let stonePop = 0;                              // 턴 소모 팝 애니메이션 (1→0)
let shake = 0;
let toast = null, failWaiting = false, advanceTimer = null;
let hover = null;        // 누르는 중인 보드 칸 (배치 미리보기)
let pressing = false;    // 포인터를 누르고 있는 동안에만 미리보기 갱신
let enemyPending = false, enemyTimer = null;   // 적 턴 지연 처리
let fxLock = false;                            // [A-2] 정적 레벨: 포획 연출 중 입력 잠금 (시체 위 배치 방지)

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');

const idx = (x, y) => y * N + x;
const inBoard = (x, y) => x >= 0 && x < N && y >= 0 && y < N;
const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
const isBlock = v => v > 0;

// ===== 레벨 로드 =====
// usedSeeds[levelIdx] = 이미 사용한 시드 Set (재시도/리플레이에서 중복 회피)
const usedSeeds = {};

function pickSeed(lv, reuse) {
  // reuse=true: 현재 시드 그대로 (실패 후 재시도)
  if (reuse && currentSeed) return currentSeed;
  const pool = lv.seeds || [];
  if (!pool.length) return (Math.random() * 0xFFFFFFFF) | 0;   // seeds 없으면 완전 랜덤
  const used = usedSeeds[levelIdx] || new Set();
  const unused = pool.filter(s => !used.has(s));
  const candidates = unused.length ? unused : pool;             // 다 썼으면 전체 재사용
  return candidates[(Math.random() * candidates.length) | 0];
}

function loadLevel(i, { reuse = false } = {}) {
  levelIdx = i;
  level = LEVELS[i];
  N = level.board;

  // 시드 선택 및 PRNG 초기화
  const seed = pickSeed(level, reuse);
  currentSeed = seed;
  if (!reuse) {
    if (!usedSeeds[i]) usedSeeds[i] = new Set();
    usedSeeds[i].add(seed);
  }
  prng = mulberry32(seed);

  resize();
  grid = new Array(N * N).fill(EMPTY);
  gameOver = false;
  flashes = []; particles = [];
  dying = [];
  bolts = [];
  pendingHits = [];
  pendingFlashes = [];
  stonePop = 0;
  shake = 0; toast = null; failWaiting = false;
  hover = null;
  pressing = false;
  enemyPending = false;
  fxLock = false;
  if (enemyTimer) { clearTimeout(enemyTimer); enemyTimer = null; }
  nextSpread = null;
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  // mirror: false 레벨은 미러링 없이 항상 원좌표 그대로 (튜토리얼 고정 방향용).
  // 미러링을 끄면 fx/fy용 prng 2회 소비도 건너뛴다 — 시드 검증 시 툴과 소비 순서가 같아야 함.
  const doMirror = level.mirror !== false;
  const fx = doMirror && prng() < .5;
  const fy = doMirror && prng() < .5;
  // 적 항목: [x,y] | [x,y,hp] | [x,y,hp,combat(0/1)] — combat 생략 시 레벨 combat 플래그가 기본 속성
  for (const e of level.enemies) {
    const [x, y] = e;
    const hp2 = e[2] === 2;
    const cb = e.length > 3 ? !!e[3] : !!level.combat;
    grid[idx(fx ? N - 1 - x : x, fy ? N - 1 - y : y)] = foeValue(hp2, cb);
  }
  // edge wall: 적과 같은 미러링 적용 (상대 위치 유지).
  // 반전 시 경계 벽의 기준 칸이 바뀐다 — rightWall은 x반전에서 (N-2-x), downWall은 y반전에서 (N-2-y).
  rightWallSet = new Set((level.rightWalls || []).map(([x, y]) =>
    wallKey(fx ? N - 2 - x : x, fy ? N - 1 - y : y)));
  downWallSet = new Set((level.downWalls || []).map(([x, y]) =>
    wallKey(fx ? N - 1 - x : x, fy ? N - 2 - y : y)));
  // 금 간 벽: 일반 경계벽과 같은 미러 변환
  crackedRightSet = new Set((level.crackedRightWalls || []).map(([x, y]) =>
    wallKey(fx ? N - 2 - x : x, fy ? N - 1 - y : y)));
  crackedDownSet = new Set((level.crackedDownWalls || []).map(([x, y]) =>
    wallKey(fx ? N - 1 - x : x, fy ? N - 2 - y : y)));
  nextBreak = null;
  if (level.walls) {   // 프리셋 벽: 적과 같은 미러링 적용 (상대 위치 유지)
    for (const [x, y, hp] of level.walls) {
      grid[idx(fx ? N - 1 - x : x, fy ? N - 1 - y : y)] = hp;
    }
  }
  // 예산: 기본 = schedule 합 + 6 (⚠️ 잠정, 밸런스 미검증). exactBudget 레벨은 솔버 min 그대로 (제로 슬랙).
  stonesLeft = level.schedule.reduce((a, b) => a + b, 0) + (level.exactBudget ? 0 : 6);
  turnIdx = 0;
  turnLeft = level.schedule[0];

  if (level.spread) computeNextSpread();
  overlay.classList.add('hidden');
  if (levelIdx === 0) toast = { text: '적의 길을 막아보세요', t: 1, sticky: false };
  updateHud();
}

function enemyCount() { return grid.filter(v => v < 0).length; }

function updateHud() {
  document.getElementById('uiLevel').textContent = levelIdx + 1;
  document.getElementById('uiFoes').textContent = enemyCount();
  document.getElementById('uiStones').textContent = stonesLeft;
}

// ===== 배치 (탭 1회 = 돌 1개, 빈칸 전용) =====
function placeStone(x, y) {
  if (gameOver || enemyPending || fxLock || stonesLeft <= 0 || !inBoard(x, y)) return false;
  const i = idx(x, y);
  if (grid[i] !== EMPTY) {           // 벽·적 위 배치 불가 (흰 플래시 피드백)
    flashes.push({ c: i, t: 1, col: '255,255,255' });
    return false;
  }
  grid[i] = level.hp || 1;                                           // 배치 내구도 (레벨별 hp 플래그, 기본 1)
  stonesLeft--;
  stonePop = 1;                                                      // 턴 소모 팝
  turnLeft--;

  const fired = captureRegions();
  if (!checkEnd(true) && turnLeft <= 0) {
    if (level.spread) {
      // 적 턴 지연: 포획 연출 종료 후 400ms 정적 — [내 공격]→정적→[적 확산] 3박자 (포획 없으면 120ms)
      enemyPending = true;
      let fxEnd = performance.now() + 120;
      for (const d of dying) fxEnd = Math.max(fxEnd, d.at + 400);            // 폭발 후 정적
      for (const b of bolts) fxEnd = Math.max(fxEnd, b.at + b.dur + 400);    // 화살 종료 후 정적
      enemyTimer = setTimeout(enemyPhase, Math.max(120, fxEnd - performance.now()));
    } else {
      turnIdx = Math.min(turnIdx + 1, level.schedule.length - 1);
      turnLeft = level.schedule[turnIdx];   // 정적 레벨은 즉시 다음 묶음 (이월 없음)
    }
  }
  if (fired && !level.spread && !gameOver) {
    // [A-2] 정적 레벨: 파동(화살·폭발)이 끝날 때까지 입력 잠금 — 시체 칸 배치·파동 중첩 방지
    fxLock = true;
    let fxEnd = performance.now();
    for (const d of dying) fxEnd = Math.max(fxEnd, d.at + 150);
    for (const b of bolts) fxEnd = Math.max(fxEnd, b.at + b.dur + 150);
    enemyTimer = setTimeout(() => { enemyTimer = null; fxLock = false; }, Math.max(0, fxEnd - performance.now()));
  }
  updateHud();
  return true;
}

function enemyPhase() {
  enemyTimer = null;
  if (gameOver) { enemyPending = false; return; }
  const finishPhase = () => {
    enemyTimer = null;
    if (gameOver) { enemyPending = false; return; }
    // 2박: 확산 — 적 턴의 마지막 동작. "적이 놓였다 = 이제 내 턴"이 항상 성립.
    executeSpread();
    const fired = captureRegions();   // 강제 자충 처리 (갈 곳이 마지막 빈칸뿐이었던 경우)
    computeNextSpread();
    turnIdx = Math.min(turnIdx + 1, level.schedule.length - 1);
    turnLeft = level.schedule[turnIdx];
    updateHud();
    if (fired) {
      // 자충 파동은 적 턴의 사건 — 화살·폭발·정적이 끝난 뒤에 내 턴으로 전환 (내 턴 침범 방지)
      let fxEnd = performance.now();
      for (const d of dying) fxEnd = Math.max(fxEnd, d.at + 400);
      for (const b of bolts) fxEnd = Math.max(fxEnd, b.at + b.dur + 400);
      enemyTimer = setTimeout(() => {
        enemyTimer = null;
        enemyPending = false;
        checkEnd();
        updateHud();
      }, Math.max(0, fxEnd - performance.now()));
    } else {
      enemyPending = false;
      checkEnd();
    }
  };
  // [v35] 매 턴 벽 공격 폐지 — 적의 공격은 포획 반격(밀폐 순간 동시 사격)뿐. 적 턴 = 확산만.
  finishPhase();
}


// ===== 핵심: 포획 판정 [v36] =====
// 발동 = 적 영역의 빈칸 0 (완전 밀폐). 내 화살(블록→적)과 반격 화살(적→블록)을 한 번에 산출.
// 반환: {shots, counters} — 포획 실행과 배치 미리보기가 공유 (예고 = 실제).
function computeShots(board) {
  const seen = new Array(N * N).fill(false);
  const shots = [];                             // 내 화살: {from: 블록, to: 적, round, kill}
  const sets = [];                              // 사후 상태 변경: [칸, 새 값] (사망=EMPTY, hp2 강등, 잠금)
  const counters = [];                          // 반격 화살: {from: 적, to: 블록} — 밀폐 영역의 적만 (v36)
  for (let i = 0; i < N * N; i++) {
    if (isBlock(board[i]) || seen[i]) continue;
    const cells = [];
    const queue = [i];
    seen[i] = true;
    let empties = 0, hasEnemy = false;
    while (queue.length) {
      const c = queue.pop();
      cells.push(c);
      if (board[c] === EMPTY) empties++;
      else if (board[c] < 0) hasEnemy = true;
      const cx = c % N, cy = (c / N) | 0;
      for (const [dx, dy] of DIRS) {
        const nx = cx + dx, ny = cy + dy;
        if (!inBoard(nx, ny)) continue;
        const ni = idx(nx, ny);
        if (!isBlock(board[ni]) && !seen[ni] && !blockedBetween(cx, cy, nx, ny)) { seen[ni] = true; queue.push(ni); }
      }
    }
    if (!hasEnemy || empties > 0) continue;            // 완전 밀폐(빈칸 0)만 발동
    const foes = cells.filter(c => board[c] < 0).sort((a, b) => a - b);
    // [규칙 b] 발사는 밀폐 "순간" 1회 — 전원 잠금이면 이미 발사된 밀폐 잔존, 재발사 없음
    if (foes.every(c => foeLocked(board[c]))) continue;
    const enemySet = new Set(foes);
    const walls = new Set();
    for (const c of enemySet) {
      const cx = c % N, cy = (c / N) | 0;
      for (const [dx, dy] of DIRS) {
        const nx = cx + dx, ny = cy + dy;
        if (inBoard(nx, ny) && isBlock(board[idx(nx, ny)]) && !blockedBetween(cx, cy, nx, ny)) walls.add(idx(nx, ny));
      }
    }
    // [내 화살 — 최대 매칭 × 라운드(연타)] 블록·적 좌상단 순 (결정론, 솔버와 동일 기준).
    // 라운드마다 "아직 안 쏜 벽 × 생존 적" 재매칭 — hp1 전용 판은 1라운드로 끝나 기존과 동일.
    const wallOrder = [...walls].sort((a, b) => a - b);
    const hp = new Map(foes.map(c => [c, foeTough(board[c]) ? 2 : 1]));
    const fired = new Set();
    let engaged = false, killsHere = 0, round = 0;
    while (true) {
      const alive = new Set(foes.filter(c => hp.get(c) > 0));
      if (!alive.size) break;
      const foesOf = w => {
        const wx = w % N, wy = (w / N) | 0, out = [];
        for (const [dx, dy] of DIRS) {
          const nx = wx + dx, ny = wy + dy;
          if (inBoard(nx, ny) && alive.has(idx(nx, ny)) && !blockedBetween(wx, wy, nx, ny)) out.push(idx(nx, ny));
        }
        return out.sort((a, b) => a - b);
      };
      const matchedBy = new Map();                // 적 → 블록 (이번 라운드)
      const augment = (w, visited) => {
        for (const f of foesOf(w)) {
          if (visited.has(f)) continue;
          visited.add(f);
          if (!matchedBy.has(f) || augment(matchedBy.get(f), visited)) { matchedBy.set(f, w); return true; }
        }
        return false;
      };
      for (const w of wallOrder) if (!fired.has(w)) augment(w, new Set());
      if (!matchedBy.size) break;
      const shotOf = new Map();
      for (const [f, w] of matchedBy) shotOf.set(w, f);
      for (const w of wallOrder) if (shotOf.has(w)) {
        const f = shotOf.get(w);
        fired.add(w); hp.set(f, hp.get(f) - 1);
        const kill = hp.get(f) <= 0;
        if (kill) killsHere++;
        shots.push({ from: w, to: f, round, kill });
      }
      engaged = true; round++;
    }
    for (const f of foes) {                       // 사후 상태: 사망 / hp2 강등 / 잠금·해제
      if (hp.get(f) <= 0) { sets.push([f, EMPTY]); continue; }
      let nv = foeNorm(board[f]);
      if (foeTough(nv) && hp.get(f) === 1) nv += 2;              // hp2 피격 강등
      if (engaged && killsHere === 0) nv -= 4;                   // 교전 후 생존 + 영역 그대로 밀폐 → 잠금
      if (nv !== board[f]) sets.push([f, nv]);
    }
    // [반격 — v36] 밀폐 영역의 "전투 속성" 적 전원(죽는 적 포함)이 인접 벽에 화살 1발, 벽당 1타 (최대 매칭).
    const foeOrder = foes.filter(c => foeCombat(board[c]));
    const wallsOfFoe = f => {
      const fx2 = f % N, fy2 = (f / N) | 0, out = [];
      for (const [dx, dy] of DIRS) {
        const nx = fx2 + dx, ny = fy2 + dy;
        if (inBoard(nx, ny) && isBlock(board[idx(nx, ny)]) && !blockedBetween(fx2, fy2, nx, ny)) out.push(idx(nx, ny));
      }
      return out.sort((a, b) => (board[a] - board[b]) || (a - b));
    };
    const hitBy = new Map();                      // 블록 → 적
    const augC = (f, visited) => {
      for (const w of wallsOfFoe(f)) {
        if (visited.has(w)) continue;
        visited.add(w);
        if (!hitBy.has(w) || augC(hitBy.get(w), visited)) { hitBy.set(w, f); return true; }
      }
      return false;
    };
    for (const f of foeOrder) augC(f, new Set());
    const counterOf = new Map();                  // 적 → 블록
    for (const [w, f] of hitBy) counterOf.set(f, w);
    for (const f of foeOrder) if (counterOf.has(f)) counters.push({ from: f, to: counterOf.get(f) });
  }
  return { shots, counters, sets };
}

function captureRegions() {
  const { shots, counters, sets } = computeShots(grid);
  if (!shots.length && !sets.length) return 0;
  const t0 = performance.now();
  for (const [c, v] of sets) grid[c] = v;              // 로직은 즉시 — 사망/강등/잠금 (죽은 칸은 다음 조임의 자리)
  const ROUND_GAP = 180;                               // 연타 라운드 간 간격 (2라운드 화살은 반 박자 늦게)
  shots.forEach(({ from, to, round, kill }) => {
    const at = t0 + round * ROUND_GAP;
    bolts.push({ from, to, at, dur: 225 });            // [동시 발사] 같은 라운드는 일제 발사·일제 명중
    if (kill) dying.push({ c: to, at: at + 225, done: false });        // 명중 순간 폭발
    else pendingFlashes.push({ c: to, at: at + 225, col: '255,215,90' });   // hp2 강등 피격 표시
  });
  for (const { from, to } of counters) {               // [v36] 반격: 밀폐 영역의 전투 속성 적만
    bolts.push({ from, to, at: t0, dur: 225, combat: true });   // 반격 화살: 내 화살과 교차 비행
    pendingHits.push({ c: to, at: t0 + 225 });                  // 명중 순간 내구도 감소 (화면·로직 동기)
  }
  return shots.length;
}

function spawnBurst(c) {
  const x = c % N, y = (c / N) | 0;
  const px = pad + (x + .5) * cell, py = pad + (y + .5) * cell;
  for (let k = 0; k < 8; k++) {
    const a = fxRng() * Math.PI * 2;
    const sp = cell * (2 + fxRng() * 4);
    particles.push({
      x: px, y: py,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - cell * 2,
      t: 1, s: cell * (0.1 + fxRng() * 0.12),
    });
  }
}

// ===== 확산/침식 =====
// [자살 확산 금지] 번지면 그 영역의 빈칸이 0이 되는 칸(= 영역의 마지막 빈칸)은 확산·예고에서 제외.
// 마무리 봉인은 항상 플레이어의 돌 — "적 생성 → 즉시 피격" 장면 원천 제거.
function isSuicideCell(c) {
  const seen = new Set([c]);
  const q = [c];
  let empties = 0;
  while (q.length) {
    const k = q.pop();
    if (grid[k] === EMPTY) empties++;
    if (empties > 1) return false;               // 빈칸 2개 이상 → 안전 (조기 종료)
    const kx = k % N, ky = (k / N) | 0;
    for (const [dx, dy] of DIRS) {
      const nx = kx + dx, ny = ky + dy;
      if (!inBoard(nx, ny)) continue;
      const ni = idx(nx, ny);
      if (!isBlock(grid[ni]) && !seen.has(ni) && !blockedBetween(kx, ky, nx, ny)) { seen.add(ni); q.push(ni); }
    }
  }
  return empties === 1;                          // 이 칸이 영역의 마지막 빈칸
}

// [금 간 벽] 인접 적이 있는 intact 균열 벽 중 좌상단 우선 (y→x→r<d) — 워커 attackTarget과 동일 결정론
function pickBreakTarget() {
  const cands = [];
  for (const key of crackedRightSet) { const [x, y] = key.split(',').map(Number); cands.push({ t: 'r', x, y }); }
  for (const key of crackedDownSet) { const [x, y] = key.split(',').map(Number); cands.push({ t: 'd', x, y }); }
  cands.sort((a, z) => (a.y - z.y) || (a.x - z.x) || (a.t < z.t ? -1 : 1));
  for (const w of cands) {
    const c1 = idx(w.x, w.y), c2 = w.t === 'r' ? idx(w.x + 1, w.y) : idx(w.x, w.y + 1);
    if (grid[c1] < 0 || grid[c2] < 0) return w;
  }
  return null;
}
function breakValid(w) {
  if (!w) return false;
  const set = w.t === 'r' ? crackedRightSet : crackedDownSet;
  if (!set.has(wallKey(w.x, w.y))) return false;
  const c1 = idx(w.x, w.y), c2 = w.t === 'r' ? idx(w.x + 1, w.y) : idx(w.x, w.y + 1);
  return grid[c1] < 0 || grid[c2] < 0;
}
function floodUnlockAt(seed) {                   // 벽 파괴로 영역이 열렸으면 그 영역의 잠금 해제 (워커 unlockRegionAt 미러)
  if (isBlock(grid[seed])) return;
  const q = [seed], vis = new Set([seed]), cells = [];
  let hasEmpty = false;
  while (q.length) {
    const c = q.pop(); cells.push(c);
    if (grid[c] === EMPTY) hasEmpty = true;
    const cx = c % N, cy = (c / N) | 0;
    for (const [dx, dy] of DIRS) {
      const nx = cx + dx, ny = cy + dy;
      if (!inBoard(nx, ny) || blockedBetween(cx, cy, nx, ny)) continue;
      const ni = idx(nx, ny);
      if (!isBlock(grid[ni]) && !vis.has(ni)) { vis.add(ni); q.push(ni); }
    }
  }
  if (hasEmpty) for (const c of cells) if (grid[c] < 0 && foeLocked(grid[c])) grid[c] = foeNorm(grid[c]);
}

function executeSpread() {
  // [금 간 벽] 벽 공격 우선: 인접 blob이 있으면 그 턴은 확산 대신 벽 파괴 (PRNG 소비 없음 — 툴과 소비 순서 동일)
  let brk = breakValid(nextBreak) ? nextBreak : pickBreakTarget();
  if (brk) {
    (brk.t === 'r' ? crackedRightSet : crackedDownSet).delete(wallKey(brk.x, brk.y));
    const c1 = idx(brk.x, brk.y), c2 = brk.t === 'r' ? idx(brk.x + 1, brk.y) : idx(brk.x, brk.y + 1);
    flashes.push({ c: c1, t: 1, col: '240,200,90' });
    flashes.push({ c: c2, t: 1, col: '240,200,90' });
    shake = Math.min(16, shake + 5);
    floodUnlockAt(isBlock(grid[c1]) ? c2 : c1);  // 열린 영역의 잠금 해제
    nextBreak = null; nextSpread = null;
    return;
  }
  let target = nextSpread;
  if (target === null || grid[target] !== EMPTY || !isAdjacentToEnemy(target) || isSuicideCell(target)) {
    target = pickSpreadCell();                   // 예고 무효(막힘/자살화) → 재선택
  }
  if (target !== null) {
    grid[target] = spawnFoeValue(target);        // 확산 자식: hp1, 혈통 전투 상속 (혼합 인접은 전투 우선)
    flashes.push({ c: target, t: 1, col: '217,74,61' });   // 확산 순간 표시
  }
  nextSpread = null; nextBreak = null;
}

function spawnFoeValue(i) {
  const cx = i % N, cy = (i / N) | 0;
  for (const [dx, dy] of DIRS) {
    const nx = cx + dx, ny = cy + dy;
    if (inBoard(nx, ny) && grid[idx(nx, ny)] < 0 && !blockedBetween(cx, cy, nx, ny) && foeCombat(grid[idx(nx, ny)]))
      return foeValue(false, true);
  }
  return foeValue(false, false);
}

// [규칙 b] 벽 파괴로 밀폐가 풀린 영역의 잠금 해제 — 다시 밀폐되면 새 볼리 대상
function unlockAround(c) {
  const cx = c % N, cy = (c / N) | 0;
  for (const [dx, dy] of DIRS) {
    const nx = cx + dx, ny = cy + dy;
    if (!inBoard(nx, ny) || blockedBetween(cx, cy, nx, ny)) continue;
    const ni = idx(nx, ny);
    if (!(grid[ni] < 0 && foeLocked(grid[ni]))) continue;
    const q = [ni]; const vis = new Set([ni]);
    while (q.length) {
      const k = q.pop();
      if (grid[k] < 0 && foeLocked(grid[k])) grid[k] = foeNorm(grid[k]);
      const kx = k % N, ky = (k / N) | 0;
      for (const [ex, ey] of DIRS) {
        const mx = kx + ex, my = ky + ey;
        if (!inBoard(mx, my) || blockedBetween(kx, ky, mx, my)) continue;
        const mi = idx(mx, my);
        if (!isBlock(grid[mi]) && !vis.has(mi)) { vis.add(mi); q.push(mi); }
      }
    }
  }
}

function isAdjacentToEnemy(i) {
  const cx = i % N, cy = (i / N) | 0;
  return DIRS.some(([dx, dy]) =>
    inBoard(cx + dx, cy + dy) && grid[idx(cx + dx, cy + dy)] < 0 && !blockedBetween(cx, cy, cx + dx, cy + dy));
}

function pickSpreadCell() {
  const frontier = new Set();
  for (let i = 0; i < N * N; i++) {
    if (!(grid[i] < 0)) continue;
    const cx = i % N, cy = (i / N) | 0;
    for (const [dx, dy] of DIRS) {
      const nx = cx + dx, ny = cy + dy;
      if (inBoard(nx, ny) && grid[idx(nx, ny)] === EMPTY && !blockedBetween(cx, cy, nx, ny)) frontier.add(idx(nx, ny));
    }
  }
  if (frontier.size === 0) return null;
  const weigh = (allowSuicide) => {
    const out = [];
    for (const i of frontier) {
      if (!allowSuicide && isSuicideCell(i)) continue;   // [자살 확산 금지] 대안이 있으면 마지막 빈칸 회피
      const cx = i % N, cy = (i / N) | 0;
      let openness = 0;
      for (const [dx, dy] of DIRS) {
        const nx = cx + dx, ny = cy + dy;
        if (inBoard(nx, ny) && grid[idx(nx, ny)] === EMPTY && !blockedBetween(cx, cy, nx, ny)) openness++;
      }
      const w = 1 + openness * 2;
      for (let j = 0; j < w; j++) out.push(i);
    }
    return out;
  };
  let weighted = weigh(false);
  if (weighted.length === 0) weighted = weigh(true);   // 갈 곳이 자살 칸뿐 → 어쩔 수 없이 진입 (강제 자충)
  return weighted[Math.floor(prng() * weighted.length)];
}

function computeNextSpread() {
  // [금 간 벽] 벽 공격 예정이면 예고 = 벽 (확산 추첨 없음 — PRNG 소비 없음, 툴과 소비 순서 동일)
  nextBreak = pickBreakTarget();
  nextSpread = nextBreak ? null : pickSpreadCell();
}

// [A-1] 예고 유효성: 실행(executeSpread)과 같은 기준으로 매 프레임 판정 — 예고가 거짓말하는 창 제거.
// 예고 칸이 막히거나/비인접화되거나/자살화되면 숨김. 단 안전 칸이 전무하면(강제 자충 예정) 그대로 유효.
function telegraphValid() {
  if (nextSpread === null || grid[nextSpread] !== EMPTY || !isAdjacentToEnemy(nextSpread)) return false;
  if (!isSuicideCell(nextSpread)) return true;
  for (let i = 0; i < N * N; i++) {              // 자살 칸 예고: 안전한 대안이 있으면 재선택될 것 → 무효
    if (grid[i] !== EMPTY || !isAdjacentToEnemy(i)) continue;
    if (!isSuicideCell(i)) return false;
  }
  return true;                                   // 전부 자살 칸 → 강제 진입 예정, 예고 유효
}



// ===== 클리어/실패 =====
function checkEnd(preEnemyTurn = false) {
  if (gameOver) return true;
  if (enemyCount() === 0) { onClear(); return true; }
  if (stonesLeft <= 0) {
    // [v37 유예] 확산 레벨: 마지막 돌 직후엔 실패하지 않고 다가올 적 턴(강제 자충 → 파동)까지 지켜본다.
    // 적 턴 종료 후의 checkEnd()가 최종 판정 — 그때도 잔존이면 돌 소진.
    if (preEnemyTurn && level.spread && turnLeft <= 0) return false;
    onFail('내블록 소진');
    return true;
  }
  return false;
}

function onClear() {
  gameOver = true;
  // [v30] 연출 종료 대기: 화살·폭발이 다 끝난 뒤 배너 표시 — 판 중앙 배너가 화살을 가리지 않게
  let fxEnd = performance.now();
  for (const d of dying) fxEnd = Math.max(fxEnd, d.at);
  for (const b of bolts) fxEnd = Math.max(fxEnd, b.at + b.dur + 180);
  const wait = Math.max(0, fxEnd - performance.now()) + 150;
  if (levelIdx + 1 < LEVELS.length) {
    advanceTimer = setTimeout(() => {
      toast = { text: '클리어!', t: 1, sticky: false };
      advanceTimer = setTimeout(() => loadLevel(levelIdx + 1), 1200);   // 클리어 → 새 시드 (reuse 기본값 false)
    }, wait);
  } else {
    advanceTimer = setTimeout(() => {
      msgEl.textContent = '전체 클리어!';
      overlay.classList.remove('hidden');
    }, wait);
  }
}

function onFail(reason) {
  gameOver = true;
  failWaiting = true;
  toast = { text: `${reason} — 탭해서 재시도`, t: 1, sticky: true };
}

// ===== 레이아웃/렌더링 =====
let size = 0, cell = 0, pad = 0, barTop = 0, barH = 0;
const WALL_COLOR = '#3478f6';                         // [v39] 내 블록 단일 파랑 — 손상은 색이 아니라 숫자로만 표현

function resize() {
  const stage = document.getElementById('stage');
  size = Math.min(stage.clientWidth - 16, (stage.clientHeight - 16) / 1.18, 520);
  size = Math.max(size, 140);   // 레이아웃 초기화·회전 순간 clientHeight가 0이면 size가 음수가 됨 → roundRect 음수 반경 크래시 방지
  const h = size * 1.18;
  const dpr = window.devicePixelRatio || 1;
  cv.width = size * dpr;
  cv.height = h * dpr;
  cv.style.width = size + 'px';
  cv.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  pad = size * 0.03;
  cell = (size - pad * 2) / N;
  barTop = size;
  barH = h - size;
}

function drawCell(x, y, color, r = 0.42) {
  ctx.fillStyle = color;
  const px = pad + x * cell, py = pad + y * cell;
  ctx.beginPath();
  ctx.roundRect(px + cell * (0.5 - r), py + cell * (0.5 - r), cell * r * 2, cell * r * 2, cell * 0.16);
  ctx.fill();
}

function drawEnemy(x, y, v = ENEMY) {
  // 전투 속성 = 보라 (만지면 아프다), 비전투 = 빨강. 숫자 = 남은 내구도 (hp2면 2)
  drawCell(x, y, foeCombat(v) ? '#8e44ad' : '#d94a3d', 0.44);
  ctx.fillStyle = '#fff';
  ctx.font = `700 ${cell * 0.34}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(foeTough(v) ? '2' : '1', pad + (x + .5) * cell, pad + (y + .52) * cell);
}

function draw(now) {
  const h = size * 1.18;
  ctx.clearRect(0, 0, size, h);
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
  ctx.fillStyle = '#c9a45c';
  ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = 'rgba(60,40,10,.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= N; i++) {
    const p = pad + i * cell;
    ctx.beginPath(); ctx.moveTo(pad, p); ctx.lineTo(size - pad, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, pad); ctx.lineTo(p, size - pad); ctx.stroke();
  }

  for (const f of flashes) {
    const x = f.c % N, y = (f.c / N) | 0;
    ctx.fillStyle = `rgba(${f.col},${f.t * 0.7})`;
    ctx.fillRect(pad + x * cell, pad + y * cell, cell, cell);
  }

  // 확산 예고 (유효할 때만 — 예고 = 적의 진짜 다음 수)
  if (!gameOver && telegraphValid()) {
    const x = nextSpread % N, y = (nextSpread / N) | 0;
    const pulse = 0.35 + 0.35 * Math.sin(now / 250);
    ctx.strokeStyle = `rgba(217,74,61,${pulse + 0.3})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(pad + x * cell + 3, pad + y * cell + 3, cell - 6, cell - 6);
    ctx.setLineDash([]);
    ctx.fillStyle = `rgba(217,74,61,${pulse * 0.4})`;
    ctx.fillRect(pad + x * cell + 3, pad + y * cell + 3, cell - 6, cell - 6);
  }

  // edge walls (v43)
  ctx.strokeStyle = 'rgba(232,228,218,.95)';
  ctx.lineWidth = Math.max(4, cell * 0.09);
  ctx.lineCap = 'round';
  for (const key of rightWallSet) {
    const [x, y] = key.split(',').map(Number);
    const px = pad + (x + 1) * cell;
    const py = pad + y * cell;
    ctx.beginPath();
    ctx.moveTo(px, py + cell * 0.16);
    ctx.lineTo(px, py + cell * 0.84);
    ctx.stroke();
  }
  for (const key of downWallSet) {
    const [x, y] = key.split(',').map(Number);
    const px = pad + x * cell;
    const py = pad + (y + 1) * cell;
    ctx.beginPath();
    ctx.moveTo(px + cell * 0.16, py);
    ctx.lineTo(px + cell * 0.84, py);
    ctx.stroke();
  }
  // [금 간 벽] 균열 경계벽: 호박색 점선 조각 — "부서질 수 있는 벽"이 겉모습으로 읽히게
  ctx.strokeStyle = 'rgba(240,200,90,.95)';
  ctx.lineWidth = Math.max(4, cell * 0.09);
  for (const key of crackedRightSet) {
    const [x, y] = key.split(',').map(Number);
    const px = pad + (x + 1) * cell, py = pad + y * cell;
    ctx.beginPath();
    ctx.moveTo(px, py + cell * 0.16); ctx.lineTo(px, py + cell * 0.40);
    ctx.moveTo(px, py + cell * 0.60); ctx.lineTo(px, py + cell * 0.84);
    ctx.stroke();
  }
  for (const key of crackedDownSet) {
    const [x, y] = key.split(',').map(Number);
    const px = pad + x * cell, py = pad + (y + 1) * cell;
    ctx.beginPath();
    ctx.moveTo(px + cell * 0.16, py); ctx.lineTo(px + cell * 0.40, py);
    ctx.moveTo(px + cell * 0.60, py); ctx.lineTo(px + cell * 0.84, py);
    ctx.stroke();
  }
  // 파괴 예고: 부술 벽에 맥동 X 마커
  if (!gameOver && breakValid(nextBreak)) {
    const w = nextBreak;
    const mx = w.t === 'r' ? pad + (w.x + 1) * cell : pad + (w.x + 0.5) * cell;
    const my = w.t === 'r' ? pad + (w.y + 0.5) * cell : pad + (w.y + 1) * cell;
    const pulse = 0.4 + 0.4 * Math.sin(now / 220);
    const r2 = cell * 0.14;
    ctx.strokeStyle = `rgba(240,200,90,${0.4 + pulse * 0.6})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(mx - r2, my - r2); ctx.lineTo(mx + r2, my + r2);
    ctx.moveTo(mx + r2, my - r2); ctx.lineTo(mx - r2, my + r2);
    ctx.stroke();
  }

  // 보드 오브젝트
  const dyingSet = new Set(dying.filter(d => !d.done).map(d => d.c));   // 폭발 대기 적: 터질 때까지 그려짐
  for (let i = 0; i < N * N; i++) {
    const x = i % N, y = (i / N) | 0;
    const v = grid[i];
    if (dyingSet.has(i)) { drawEnemy(x, y); continue; }
    if (isBlock(v)) {
      drawCell(x, y, WALL_COLOR);
      ctx.fillStyle = 'rgba(255,255,255,.9)';   // 파랑 배경 공통 — 흰 글자 대비
      ctx.font = `700 ${cell * 0.32}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(v, pad + (x + .5) * cell, pad + (y + .52) * cell);
    } else if (v < 0) drawEnemy(x, y, v);
  }

  // 배치 미리보기 (누르는 중)
  if (!gameOver && hover !== null) {
    const [hx, hy] = hover;
    const hi = idx(hx, hy);
    const ok = grid[hi] === EMPTY && stonesLeft > 0;   // 빈칸이면 어디든 배치 가능
    ctx.fillStyle = ok ? 'rgba(70,180,110,.55)' : 'rgba(220,70,60,.45)';
    ctx.fillRect(pad + hx * cell, pad + hy * cell, cell, cell);

    // 포획 미리보기
    if (ok) {
      const sim = grid.slice();
      const i2 = idx(hx, hy);
      sim[i2] = level.hp || 1;
      const pulse = 0.5 + 0.5 * Math.sin(now / 150);
      for (const c of computeShots(sim).shots.map(s => s.to)) {   // 이 수로 실제 화살 맞는 적에만 X (예고 = 실제)
        const x = c % N, y = (c / N) | 0;
        ctx.strokeStyle = `rgba(255,255,255,${0.45 + pulse * 0.55})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(pad + (x + .5) * cell, pad + (y + .5) * cell, cell * (0.44 + pulse * 0.06), 0, Math.PI * 2);
        ctx.moveTo(pad + (x + .32) * cell, pad + (y + .32) * cell);
        ctx.lineTo(pad + (x + .68) * cell, pad + (y + .68) * cell);
        ctx.moveTo(pad + (x + .68) * cell, pad + (y + .32) * cell);
        ctx.lineTo(pad + (x + .32) * cell, pad + (y + .68) * cell);
        ctx.stroke();
      }
    }
  }

  // [v30] 포획 화살 + [v33] 전투 화살: 발사 → 명중 후 180ms 잔류 페이드
  // 테두리로 진영 구분 — 포획(내 벽 발사) = 흰 테두리, 전투(적 발사) = 어두운 테두리
  for (const b of bolts) {
    const grow = Math.min(1, (now - b.at) / b.dur);   // 0→1 신장
    if (grow <= 0) continue;
    const fade = 1 - Math.max(0, now - (b.at + b.dur)) / 180;
    if (fade <= 0) continue;
    const edge = b.combat ? 'rgba(27,27,31,.9)' : 'rgba(255,255,255,.9)';
    const fx = pad + (b.from % N + .5) * cell, fy = pad + (((b.from / N) | 0) + .5) * cell;
    const tx = pad + (b.to % N + .5) * cell,   ty = pad + (((b.to / N) | 0) + .5) * cell;
    const ex = fx + (tx - fx) * grow, ey = fy + (ty - fy) * grow;   // 화살 끝점
    const ang = Math.atan2(ty - fy, tx - fx);
    const hw = cell * 0.18;                            // 화살촉 크기
    ctx.globalAlpha = fade;
    ctx.lineCap = 'round';
    ctx.strokeStyle = edge;                            // 외곽선: 적(빨강)·판(황토) 위 대비 확보
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.strokeStyle = '#d94a3d';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.fillStyle = '#d94a3d';                         // 화살촉: 공격 방향 삼각형
    ctx.beginPath();
    ctx.moveTo(ex + Math.cos(ang) * hw, ey + Math.sin(ang) * hw);
    ctx.lineTo(ex + Math.cos(ang + 2.5) * hw, ey + Math.sin(ang + 2.5) * hw);
    ctx.lineTo(ex + Math.cos(ang - 2.5) * hw, ey + Math.sin(ang - 2.5) * hw);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = edge;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // 포획 파편
  for (const p of particles) {
    ctx.fillStyle = `rgba(217,74,61,${Math.max(0, p.t)})`;
    ctx.fillRect(p.x - p.s / 2, p.y - p.s / 2, p.s, p.s);
  }
  ctx.restore();

  // 하단 바: 남은 턴(돌) 수 — 배치 순간 팝, 적 턴 중엔 상태 표시
  ctx.fillStyle = '#26262b';
  ctx.fillRect(0, barTop, size, barH);
  if (level && enemyPending) {
    // 적 턴 처리 중: 빈 큐 깜빡임 대신 상태 표시
    ctx.fillStyle = 'rgba(232,228,218,.6)';
    ctx.font = `700 ${size * 0.036}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('적 턴…', size / 2, barTop + barH * 0.5);
  } else if (level) {
    // 남은 턴수: 큰 숫자 하나. 배치 순간 커졌다가 작아지는 팝 (stonePop 1→0)
    const ease = stonePop * stonePop;                        // 감속 곡선
    const fs = size * 0.075 * (1 + 0.6 * ease);
    ctx.fillStyle = stonesLeft <= 2 ? '#d94a3d' : '#e8e4da'; // 2턴 이하 경고색
    ctx.font = `800 ${fs}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stonesLeft, size / 2, barTop + barH * 0.48);
    ctx.fillStyle = 'rgba(232,228,218,.45)';
    ctx.font = `700 ${size * 0.028}px system-ui`;
    ctx.fillText('턴', size / 2 + fs * 0.75, barTop + barH * 0.52);
  }

  // 토스트 배너
  if (toast) {
    const alpha = toast.sticky ? 1 : Math.max(0, toast.t);
    const bw = size * 0.82, bh = size * 0.15;
    ctx.fillStyle = `rgba(20,20,24,${0.78 * alpha})`;
    ctx.beginPath();
    ctx.roundRect((size - bw) / 2, size * 0.42 - bh / 2, bw, bh, bh / 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = `700 ${size * 0.055}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(toast.text, size / 2, size * 0.42);
  }
}

// ===== 루프 =====
let lastT = 0;
function loop(t) {
  const dt = t - lastT;
  lastT = t;
  for (const f of flashes) f.t -= dt / 450;
  flashes = flashes.filter(f => f.t > 0);
  for (const p of particles) {
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.vy += cell * 14 * dt / 1000;
    p.t -= dt / 650;
  }
  particles = particles.filter(p => p.t > 0);
  bolts = bolts.filter(b => t <= b.at + b.dur + 200);  // [v30] 잔류 페이드 종료 후 정리
  // [v34] 반격 명중 처리: 화살이 닿는 순간 벽 내구도 감소 (파괴 시 빈칸)
  if (pendingHits.length) {
    const rest = [];
    for (const hit of pendingHits) {
      if (t < hit.at) { rest.push(hit); continue; }
      if (isBlock(grid[hit.c])) {
        grid[hit.c]--;
        flashes.push({ c: hit.c, t: 1, col: '220,70,60' });
        if (grid[hit.c] === 0) { grid[hit.c] = EMPTY; unlockAround(hit.c); }   // [규칙 b] 벽 파괴 → 인접 잠금 영역 해제
      }
    }
    pendingHits = rest;
  }
  // [적 개체화] 지연 플래시 (hp2 피격 강등 표시)
  if (pendingFlashes.length) {
    const rest2 = [];
    for (const f of pendingFlashes) {
      if (t < f.at) { rest2.push(f); continue; }
      flashes.push({ c: f.c, t: 1, col: f.col });
    }
    pendingFlashes = rest2;
  }
  // 연쇄 폭발 처리: 시간이 된 적부터 팡 — 각 폭발마다 플래시·파편·흔들림
  if (dying.length) {
    for (const d of dying) {
      if (!d.done && t >= d.at) {
        d.done = true;
        flashes.push({ c: d.c, t: 1, col: '255,255,255' });
        spawnBurst(d.c);
        shake = Math.min(16, shake + 6);
      }
    }
    if (dying.every(d => d.done)) dying = [];
  }
  shake = Math.max(0, shake - dt / 26);
  stonePop = Math.max(0, stonePop - dt / 260);
  if (toast && !toast.sticky) {
    toast.t -= dt / 1400;
    if (toast.t <= 0) toast = null;
  }
  draw(t);
  requestAnimationFrame(loop);
}

// ===== 입력: 누르면 미리보기, 떼면 배치 =====
function boardCell(ev) {
  const rect = cv.getBoundingClientRect();
  const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
  if (py >= barTop) return null;
  const x = Math.floor((px - pad) / cell);
  const y = Math.floor((py - pad) / cell);
  return inBoard(x, y) ? [x, y] : null;
}

cv.addEventListener('pointerdown', ev => {
  if (failWaiting) { loadLevel(levelIdx, { reuse: true }); return; }   // 탭 즉시 재시도 — 같은 시드
  if (gameOver || enemyPending || fxLock) return;
  pressing = true;
  hover = boardCell(ev);
  cv.setPointerCapture(ev.pointerId);
});

cv.addEventListener('pointermove', ev => {
  if (!pressing || gameOver) return;   // 누르고 있을 때만 미리보기 갱신
  hover = boardCell(ev);
});

cv.addEventListener('pointerup', ev => {
  const wasPressing = pressing;
  pressing = false;
  hover = null;
  if (!wasPressing || gameOver || enemyPending || fxLock) return;
  const c = boardCell(ev);
  if (!c) return;
  placeStone(c[0], c[1]);                              // 배치 (내구도 3, 적 턴 유발)
});

document.getElementById('restart').addEventListener('click', () => loadLevel(0));

// [치트] HUD의 "레벨" 표기를 탭하면 다음 레벨로 점프 (마지막에서 탭하면 1로 순환)
document.querySelector('#hud span').addEventListener('click', () => {
  loadLevel((levelIdx + 1) % LEVELS.length);
});
// [치트] HUD의 "적" 표기를 탭하면 2부(전투, 레벨 6)로 점프
document.querySelectorAll('#hud span')[1].addEventListener('click', () => loadLevel(5));
window.addEventListener('resize', resize);

// ── 레벨 소스 실시간 로드 ──
// 서버(localhost/미리보기)로 열면 Level/levels.json을 직접 읽어 최신 레벨로 교체 — sync 없이 새로고침만으로 반영.
// 더블클릭(file://)이나 json 읽기 실패 시에는 위의 AUTO-GENERATED LEVELS(마지막 sync 시점)를 그대로 사용.
function levelFromSave(s) {
  const min = Number.isInteger(s.min) ? s.min : s.setBudget;
  const lv = {
    board: s.board, combat: !!s.combat,
    enemies: (s.enemies || []).map(e => [e.x, e.y]),
    schedule: Array.isArray(s.schedule) && s.schedule.length ? s.schedule : Array(min).fill(1),
    spread: s.spread !== false, min,
    exactBudget: s.exactBudget !== false,
    seeds: Array.isArray(s.seeds) ? s.seeds : [],
  };
  if (s.walls && s.walls.length) lv.walls = s.walls.map(w => [w.x, w.y, w.hp]);
  if (s.rightWalls && s.rightWalls.length) lv.rightWalls = s.rightWalls.map(w => [w.x, w.y]);
  if (s.downWalls && s.downWalls.length) lv.downWalls = s.downWalls.map(w => [w.x, w.y]);
  if (s.hp === 2) lv.hp = 2;
  if (s.mirror === false) lv.mirror = false;
  return lv;
}
async function loadLiveLevels() {
  try {
    const r = await fetch('Level/levels.json', { cache: 'no-store' });
    if (!r.ok) return;
    const data = await r.json();
    const games = (data.saves || [])
      .filter(s => /^Game L\d+$/.test(s.name) && Number.isInteger(s.min || s.setBudget))
      .sort((a, b) => +a.name.slice(6) - +b.name.slice(6));
    if (!games.length) return;
    LEVELS.length = 0;
    LEVELS.push(...games.map(levelFromSave));
    console.log(`[levels] Level/levels.json 실시간 로드: ${LEVELS.length}개`);
  } catch (e) { /* file:// 등 — 구운 LEVELS 사용 */ }
}

resize();
loadLiveLevels().then(() => { loadLevel(0); requestAnimationFrame(loop); });
</script>
